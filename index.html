<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sxgura Device Control</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
padding:20px;
overflow-x:hidden;
}

h1{
text-align:center;
color:#ff0000;
margin-bottom:25px;
font-size:28px;
text-shadow:0 0 15px #ff0000;
}

.panel{
max-width:520px;
margin:auto;
background:#050505;
border:1px solid #111;
border-radius:20px;
padding:20px;
box-shadow:0 0 25px rgba(255,0,0,.25);
}

.card{
background:#0a0a0a;
border:1px solid #181818;
padding:15px;
border-radius:14px;
margin-bottom:15px;
}

.card h2{
font-size:18px;
margin-bottom:12px;
color:#ff2b2b;
}

.info{
font-size:14px;
color:#ccc;
line-height:1.8;
word-break:break-word;
}

button{
width:100%;
padding:13px;
margin-top:10px;
background:#b30000;
border:none;
border-radius:10px;
color:#fff;
font-weight:bold;
cursor:pointer;
transition:.25s;
}

button:hover{
background:#ff0000;
box-shadow:0 0 15px rgba(255,0,0,.4);
}

video{
width:100%;
border-radius:12px;
margin-top:15px;
background:#000;
}

.status{
margin-top:10px;
font-size:13px;
color:#00ff88;
}

footer{
margin-top:25px;
text-align:center;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<h1>
SXGURA DEVICE PANEL
</h1>

<div class="panel">

<div class="card">

<h2>Información del dispositivo</h2>

<div class="info" id="deviceInfo">
Cargando...
</div>

</div>

<div class="card">

<h2>Estado de batería</h2>

<div class="info" id="batteryInfo">
Cargando...
</div>

</div>

<div class="card">

<h2>Ubicación GPS</h2>

<div class="info" id="gpsInfo">
Sin ubicación
</div>

<button onclick="getLocation()">
Enviar ubicación
</button>

</div>

<div class="card">

<h2>Cámara + Flash</h2>

<button onclick="openCamera()">
Activar cámara
</button>

<video id="camera" autoplay playsinline></video>

</div>

<div class="card">

<h2>Flash + Vibración infinita</h2>

<button onclick="toggleVibration()">
Activar / Desactivar
</button>

<div class="status" id="vibrationStatus">
Desactivado
</div>

</div>

<div class="card">

<h2>Conexión</h2>

<div class="info" id="networkInfo">
Verificando...
</div>

</div>

</div>

<footer>
Sxgura Inc © 2026
</footer>

<script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyApiO7_x468L0k0u7vheUW_luEWJ41VRUQ",

authDomain:"sxgura-web.firebaseapp.com",

projectId:"sxgura-web",

storageBucket:"sxgura-web.firebasestorage.app",

messagingSenderId:"912354449131",

appId:"1:912354449131:web:4df2a48d6eb84223bd10ae"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* INFO DISPOSITIVO */

document.getElementById("deviceInfo").innerHTML =

"Plataforma: " +
navigator.platform +

"<br><br>Navegador: " +
navigator.userAgent +

"<br><br>Idioma: " +
navigator.language +

"<br><br>Resolución: " +
screen.width + " x " + screen.height +

"<br><br>CPU: " +
(navigator.hardwareConcurrency || "Desconocido");

/* INTERNET */

function updateNetwork(){

document.getElementById("networkInfo").innerHTML =

navigator.onLine
?
"Conectado a internet"
:
"Sin conexión";

}

updateNetwork();

window.addEventListener(
"online",
updateNetwork
);

window.addEventListener(
"offline",
updateNetwork
);

/* BATERÍA */

async function getBattery(){

try{

if(!navigator.getBattery){

document.getElementById("batteryInfo").innerHTML =
"No compatible";
return;

}

const battery =
await navigator.getBattery();

function updateBattery(){

document.getElementById("batteryInfo").innerHTML =

"Nivel: " +
Math.floor(battery.level * 100) +
"%<br><br>Cargando: " +
(battery.charging ? "Sí" : "No");

}

updateBattery();

battery.addEventListener(
"levelchange",
updateBattery
);

battery.addEventListener(
"chargingchange",
updateBattery
);

}catch{

document.getElementById("batteryInfo").innerHTML =
"Bloqueado por navegador";

}

}

getBattery();

/* GPS */

async function getLocation(){

if(!navigator.geolocation){

alert("GPS no compatible");
return;

}

navigator.geolocation.getCurrentPosition(

async(position)=>{

const lat =
position.coords.latitude;

const lon =
position.coords.longitude;

document.getElementById("gpsInfo").innerHTML =

"Latitud: " + lat +
"<br><br>Longitud: " + lon;

try{

await addDoc(
collection(db,"device_logs"),
{

type:"gps",

latitude:lat,

longitude:lon,

userAgent:navigator.userAgent,

timestamp:serverTimestamp()

}

);

}catch(e){

console.log(e);

}

},

(error)=>{

alert(
"Debes aceptar el permiso GPS"
);

},

{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}

);

}

/* CÁMARA + FLASH */

let currentStream;

async function openCamera(){

try{

currentStream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:{
ideal:"environment"
}
},

audio:false

});

const video =
document.getElementById("camera");

video.srcObject = currentStream;

video.play();

const track =
currentStream.getVideoTracks()[0];

const capabilities =
track.getCapabilities();

if(capabilities.torch){

await track.applyConstraints({
advanced:[{torch:true}]
});

}

try{

await addDoc(
collection(db,"device_logs"),
{

type:"camera_opened",

timestamp:serverTimestamp()

}

);

}catch(e){

console.log(e);

}

}catch(err){

alert(
"Flash o cámara no compatible"
);

console.log(err);

}

}

/* FLASH + VIBRACIÓN */

let vibrating = false;

let vibrateLoop;

async function toggleVibration(){

if(!navigator.vibrate){

alert("No compatible");
return;

}

if(!vibrating){

vibrating = true;

/* FLASH */

openCamera();

/* VIBRACIÓN */

vibrateLoop = setInterval(()=>{

navigator.vibrate([1000,300,1000]);

},2300);

document.getElementById(
"vibrationStatus"
).innerHTML =

"FLASH Y VIBRACIÓN ACTIVADOS";

}else{

vibrating = false;

clearInterval(vibrateLoop);

navigator.vibrate(0);

/* APAGAR FLASH */

if(currentStream){

currentStream
.getTracks()
.forEach(track=>track.stop());

}

document.getElementById(
"vibrationStatus"
).innerHTML =

"FLASH Y VIBRACIÓN DESACTIVADOS";

}

}

/* GLOBAL */

window.getLocation = getLocation;

window.openCamera = openCamera;

window.toggleVibration = toggleVibration;

</script>

</body>
</html>
